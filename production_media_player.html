<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Drew's Production Media Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js for Web Audio API -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@400;800&family=Orbitron:wght@700&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #09090b;
            color: #e2e8f0;
            overflow: hidden; 
        }
        
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { 
            background: #000000; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border-radius: 8px;
            margin: 4px;
        }
        ::-webkit-scrollbar-thumb { 
            background: #27272a; 
            border-radius: 8px; 
            border: 2px solid #000000;
        }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        /* Skeuomorphic DAW Faders */
        .daw-fader {
            -webkit-appearance: none;
            background: transparent;
            margin: 0;
        }
        .daw-fader:focus { outline: none; }
        .daw-fader::-webkit-slider-runnable-track {
            width: 100%; height: 100%;
            background: transparent; border: none;
        }
        .daw-fader::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 38px; width: 22px; 
            border-radius: 4px;
            background: 
                linear-gradient(to right, transparent 46%, var(--fader-color) 46%, var(--fader-color) 54%, transparent 54%),
                linear-gradient(to bottom, #111, #444 15%, #222 50%, #444 85%, #111);
            border: 2px solid #000;
            box-shadow: -4px 0 8px rgba(0,0,0,0.9), inset 0 0 2px rgba(255,255,255,0.4);
            cursor: pointer;
        }
        #vol-master { --fader-color: #00f0ff; }
        #vol-music { --fader-color: #ff003c; }
        #vol-sfx { --fader-color: #39ff14; }

        .recessed-lcd {
            background: #000000;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid #18181b;
            border-radius: 12px;
        }

        .lcd-text { color: #00f0ff; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }

        /* 80s Hardware LCD Screen */
        .lcd-retro-screen {
            background: #2a3324; color: #0b1408; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.05);
            border: 2px solid #111; border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.1);
            letter-spacing: 2px;
        }
        .tabular-nums { font-variant-numeric: tabular-nums; }

        .lcd-mode-btn {
            background: #18181b; color: #71717a;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.5);
            border: 1px solid #222;
        }
        .lcd-mode-btn.active {
            background: #00f0ff; color: #000;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.5), 0 0 10px rgba(0,240,255,0.4);
            border-color: #00f0ff; transform: translateY(1px);
        }

        .pad-base {
            border-radius: 16px;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; transform-style: preserve-3d; border: none;
        }

        .pad-empty {
            background: linear-gradient(145deg, #27272a, #18181b);
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.05), inset -2px -2px 4px rgba(0,0,0,0.5), 0 6px #09090b, 0 8px 10px rgba(0,0,0,0.6);
        }

        .pad-music {
            background: linear-gradient(145deg, #ff003c, #b3002a);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #660018, 0 8px 15px rgba(255, 0, 60, 0.3);
            color: white;
        }
        .pad-music .icon-default { color: #ffffff !important; }
        .pad-music .pad-name { color: #ffffff !important; font-weight: 900; }

        .pad-sfx {
            background: linear-gradient(145deg, #39ff14, #22990c);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #114d06, 0 8px 15px rgba(57, 255, 20, 0.2);
            color: #000000;
        }
        .pad-sfx .icon-default { color: #000000 !important; opacity: 0.7; }
        .pad-sfx .pad-name { color: #000000 !important; font-weight: 900; }

        .pad-base:active, .pad-base.pressed { transform: translateY(4px); }

        .pad-music:active, .pad-music.pressed, .pad-music.active {
            transform: translateY(4px); background: linear-gradient(145deg, #ff1a53, #ff003c);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4), inset -2px -2px 5px rgba(0,0,0,0.3), 0 2px #660018, 0 2px 10px rgba(255, 0, 60, 0.6);
        }

        .pad-sfx:active, .pad-sfx.pressed, .pad-sfx.active {
            transform: translateY(4px); background: linear-gradient(145deg, #5cff3d, #39ff14);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.5), inset -2px -2px 5px rgba(0,0,0,0.3), 0 2px #114d06, 0 2px 10px rgba(57, 255, 20, 0.6);
        }

        /* Custom Color Theme overrides for Pads */
        .color-picker-menu { display: none; }
        .color-picker-menu.active { display: grid; }
        
        .pad-custom-color {
            background: linear-gradient(145deg, var(--pad-primary), var(--pad-secondary));
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px var(--pad-shadow), 0 8px 15px var(--pad-glow);
            color: var(--pad-text) !important;
        }
        .pad-custom-color .pad-name, .pad-custom-color .icon-default {
            color: var(--pad-text) !important;
        }
        .pad-custom-color:active, .pad-custom-color.pressed, .pad-custom-color.active {
            transform: translateY(4px);
            background: linear-gradient(145deg, var(--pad-light), var(--pad-primary));
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.4), inset -2px -2px 5px rgba(0,0,0,0.3), 0 2px var(--pad-shadow), 0 2px 10px var(--pad-glow);
        }

        .pad-base.playing-active {
            background: linear-gradient(90deg, #00f0ff, #39ff14, #ff003c, #00f0ff) !important;
            background-size: 300% 100% !important;
            color: #000000 !important;
            animation: rgbLiquid 2.5s linear infinite !important;
            transform: translateY(2px);
        }
        .pad-base.playing-active .pad-name, .pad-base.playing-active .icon-default { color: #000000 !important; }

        .pad-base.playing-active.paused {
            filter: grayscale(0.8) brightness(0.6); animation: none !important; background-position: 0% 0% !important;
            box-shadow: 0 0 0 3px #888, inset 2px 2px 5px rgba(255,255,255,0.5), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #444, 0 8px 15px rgba(0, 0, 0, 0.4) !important;
        }

        .pad-sfx.fading { animation: sfxPulse 1s infinite; }

        @keyframes rgbLiquid {
            0%   { background-position: 0% 50%; filter: drop-shadow(0 0 8px #00f0ff); box-shadow: 0 0 0 3px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #111, 0 8px 25px rgba(0, 240, 255, 0.8) !important; }
            33%  { filter: drop-shadow(0 0 8px #39ff14); box-shadow: 0 0 0 3px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #111, 0 8px 25px rgba(57, 255, 20, 0.8) !important; }
            66%  { filter: drop-shadow(0 0 8px #ff003c); box-shadow: 0 0 0 3px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #111, 0 8px 25px rgba(255, 0, 60, 0.8) !important; }
            100% { background-position: 100% 50%; filter: drop-shadow(0 0 8px #00f0ff); box-shadow: 0 0 0 3px #ffffff, inset 2px 2px 5px rgba(255,255,255,0.8), inset -2px -2px 5px rgba(0,0,0,0.3), 0 6px #111, 0 8px 25px rgba(0, 240, 255, 0.8) !important; }
        }

        @keyframes sfxPulse {
            0% { filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.8)); }
            50% { filter: drop-shadow(0 0 2px rgba(57, 255, 20, 0.2)); }
            100% { filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.8)); }
        }

        .raised-panel {
            background: #121214;
            box-shadow: inset 1px 1px 0 rgba(255,255,255,0.05), inset -1px -1px 0 rgba(0,0,0,0.8), 0 4px 15px rgba(0,0,0,0.6);
        }

        .bank-tab { background: #27272a; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.5); border-bottom: 2px solid transparent; color: #71717a; }
        
        .music-bank-tab.active-bank {
            background: #ff003c; box-shadow: 0 0 10px rgba(255, 0, 60, 0.4), inset 0 2px 4px rgba(255,255,255,0.3); border-bottom: 2px solid #b3002a; color: #fff !important; transform: translateY(1px);
        }
        .sfx-bank-tab.active-bank {
            background: #39ff14; box-shadow: 0 0 10px rgba(57, 255, 20, 0.4), inset 0 2px 4px rgba(255,255,255,0.5); border-bottom: 2px solid #22990c; color: #000 !important; transform: translateY(1px);
        }

        .hidden-file-input { display: none; }
        body.perform-mode .edit-ui { display: none !important; }
        .slide-polaroid { background: #e2e8f0; color: #0f172a; box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 1px solid #94a3b8; border-bottom-width: 4px; }
        .slide-polaroid-dark { background: #18181b; color: #f1f5f9; box-shadow: 0 4px 10px rgba(0,0,0,0.8); border: 1px solid #000000; border-bottom-width: 4px; }
        .bg-cyber-accent { background: linear-gradient(45deg, #00f0ff, #39ff14); }
        .text-cyber-accent { background: linear-gradient(to right, #00f0ff, #39ff14); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-sm">

    <div id="start-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#09090b]/95 backdrop-blur-md">
        <button id="btn-start" class="bg-cyber-accent pad-base px-10 py-6 text-black font-black rounded-2xl text-3xl transition-all shadow-[0_10px_30px_rgba(57,255,20,0.3),inset_0_2px_5px_rgba(255,255,255,0.6)] hover:scale-105 hover:brightness-110 border-none">
            <i class="ph ph-power text-4xl align-middle mr-2 drop-shadow-sm"></i> Power On Board
        </button>
    </div>

    <div id="slide-editor-overlay" class="fixed inset-0 z-[60] hidden bg-black/95 backdrop-blur-lg items-center justify-center p-8">
        <div class="relative w-full max-w-5xl aspect-video bg-[#050505] border-2 border-[#27272a] rounded-2xl shadow-[0_0_80px_rgba(0,240,255,0.15)] overflow-hidden" style="container-type: inline-size;">
            <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start pointer-events-none z-10">
                <span class="bg-black/80 text-[#00f0ff] px-3 py-1 rounded backdrop-blur text-xs font-bold border border-[#00f0ff]/30 pointer-events-auto">16:9 Live Canvas</span>
                <button id="btn-close-slide-editor" class="w-12 h-12 bg-red-600 hover:bg-red-500 text-white rounded-xl shadow-[0_4px_#990000] flex items-center justify-center text-2xl transition-all pointer-events-auto border border-red-400">×</button>
            </div>
            <textarea id="slide-editor-textarea" class="absolute inset-0 w-full h-full bg-transparent resize-none focus:outline-none placeholder-gray-800 font-bold" 
            style="font-family: 'Nunito', system-ui, sans-serif; padding: 5cqw; color: #fff; white-space: pre-wrap; line-height: 1.4; text-align: center; overflow: hidden;"></textarea>
        </div>
    </div>

    <header class="h-16 raised-panel border-b border-black flex items-center justify-between px-6 shrink-0 z-20 relative">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-cyber-accent flex items-center justify-center text-black font-black text-xl shadow-inner shadow-[0_0_15px_rgba(255,255,255,0.5)]">D</div>
            <h1 class="text-xl font-black tracking-widest uppercase text-gray-100">Mr. Drew's <span class="text-cyber-accent">Media Player</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="btn-projector" class="pad-base pad-empty px-4 py-2 rounded-lg text-gray-300 font-bold flex items-center gap-2 transition-all">
                <i class="ph-fill ph-projector-screen text-xl text-[#00f0ff]"></i>
                <span>Projector Link</span>
            </button>
            <div class="h-8 w-1 rounded-full bg-[#000] shadow-inner"></div>
            <button id="btn-load" class="w-10 h-10 pad-base pad-empty flex items-center justify-center text-gray-300 transition-all"><i class="ph-fill ph-folder-open text-xl"></i></button>
            <button id="btn-save" class="w-10 h-10 pad-base pad-empty flex items-center justify-center text-gray-300 transition-all"><i class="ph-fill ph-floppy-disk text-xl"></i></button>
            <input type="file" id="json-upload" accept=".json" class="hidden">
            <div class="h-8 w-1 rounded-full bg-[#000] shadow-inner"></div>
            <div class="flex items-center p-1.5 rounded-xl recessed-lcd bg-black border border-gray-800">
                <button id="tab-edit" class="px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all bg-[#ffd700] text-black shadow-[0_2px_0_#b39700]">Edit Mode</button>
                <button id="tab-perform" class="px-4 py-1.5 rounded-lg text-xs font-black uppercase transition-all text-gray-600">Perform</button>
            </div>
        </div>
    </header>

    <div class="h-16 bg-[#000000] border-y-2 border-[#18181b] flex items-center px-6 gap-6 shrink-0 z-10 shadow-inner">
        <div class="recessed-lcd flex-1 h-10 flex items-center px-4 gap-4 bg-[#050505] shadow-[inset_0_0_15px_rgba(0,240,255,0.05)] border border-[#00f0ff]/20">
            <i class="ph-fill ph-speaker-hifi text-[#00f0ff] text-2xl animate-pulse" id="playing-icon" style="opacity: 0.2;"></i>
            <div class="flex flex-col w-48 shrink-0 border-r border-gray-800 pr-4">
                <span class="text-[9px] text-[#00f0ff] font-mono uppercase tracking-widest font-bold opacity-70">Now Playing</span>
                <span id="now-playing-title" class="font-bold lcd-text truncate whitespace-nowrap text-lg text-white">---</span>
            </div>
            <span id="time-current" class="text-sm lcd-text font-mono w-12 text-right text-gray-300">0:00</span>
            <div class="relative flex-1 h-3 flex items-center group cursor-pointer" id="scrubber-container">
                <div class="absolute inset-0 flex items-center pointer-events-none">
                    <div class="w-full h-1.5 bg-[#111] rounded-full overflow-hidden shadow-inner border border-[#222]">
                        <div id="scrubber-fill" class="h-full bg-[#ff003c] w-0 transition-all duration-75 shadow-[0_0_10px_rgba(255,0,60,0.8)]"></div>
                    </div>
                </div>
                <input type="range" id="scrubber-input" min="0" max="100" value="0" step="0.1" class="absolute w-full opacity-0 cursor-pointer z-10">
            </div>
            <span id="time-total" class="text-sm text-gray-600 font-mono w-12">0:00</span>
        </div>

        <div class="flex items-center gap-3">
            <button id="btn-pause-music" class="pad-base bg-[#ffd700] px-5 h-10 rounded-xl text-black flex items-center justify-center gap-2 transition-all shadow-[0_4px_#b39700] font-black uppercase text-xs">
                <i class="ph-fill ph-pause text-lg"></i> Pause
            </button>
            <button id="btn-stop-music" class="pad-base bg-[#ff4500] px-5 h-10 rounded-xl text-white flex items-center justify-center gap-2 transition-all shadow-[0_4px_#992900] font-black uppercase text-xs">
                <i class="ph-fill ph-stop text-lg"></i> Stop
            </button>
        </div>
    </div>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 raised-panel border-r border-[#000] flex flex-col shrink-0 z-10">
            <div class="flex-1 flex flex-col p-6 gap-8 overflow-y-auto">
                <div class="recessed-lcd h-32 p-3 flex flex-col relative bg-[#050505] shadow-[inset_0_0_15px_rgba(57,255,20,0.05)] border border-[#39ff14]/20">
                    <span class="absolute top-2 left-3 text-[10px] text-gray-500 font-mono uppercase font-bold tracking-widest">Master Out</span>
                    <canvas id="visualizer" class="w-full h-full"></canvas>
                </div>

                <div class="flex justify-between px-2">
                    <div class="flex flex-col items-center gap-3">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Master</span>
                        <div class="h-40 w-12 bg-[#050505] rounded-lg p-1 recessed-lcd flex justify-center items-center relative overflow-hidden border border-[#222]">
                            <div class="absolute w-2 h-36 bg-[#000] rounded-full shadow-[inset_0_2px_5px_rgba(0,0,0,1)] pointer-events-none"></div>
                            <input type="range" id="vol-master" min="0" max="1" step="0.01" value="1" class="daw-fader absolute" style="width: 144px; height: 48px; transform: rotate(-90deg);">
                        </div>
                        <span id="val-vol-master" class="text-[10px] font-mono text-[#00f0ff] bg-[#000] px-2 py-0.5 rounded shadow-inner border border-[#111]">100%</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <span class="text-[10px] font-bold text-[#ff003c] uppercase tracking-widest">Music</span>
                        <div class="h-40 w-12 bg-[#050505] rounded-lg p-1 recessed-lcd flex justify-center items-center relative overflow-hidden border border-[#222]">
                            <div class="absolute w-2 h-36 bg-[#000] rounded-full shadow-[inset_0_2px_5px_rgba(0,0,0,1)] pointer-events-none"></div>
                            <input type="range" id="vol-music" min="0" max="1" step="0.01" value="0.8" class="daw-fader absolute" style="width: 144px; height: 48px; transform: rotate(-90deg);">
                        </div>
                        <span id="val-vol-music" class="text-[10px] font-mono text-[#ff003c] bg-[#000] px-2 py-0.5 rounded shadow-inner border border-[#111]">80%</span>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <span class="text-[10px] font-bold text-[#39ff14] uppercase tracking-widest">SFX</span>
                        <div class="h-40 w-12 bg-[#050505] rounded-lg p-1 recessed-lcd flex justify-center items-center relative overflow-hidden border border-[#222]">
                            <div class="absolute w-2 h-36 bg-[#000] rounded-full shadow-[inset_0_2px_5px_rgba(0,0,0,1)] pointer-events-none"></div>
                            <input type="range" id="vol-sfx" min="0" max="1" step="0.01" value="1" class="daw-fader absolute" style="width: 144px; height: 48px; transform: rotate(-90deg);">
                        </div>
                        <span id="val-vol-sfx" class="text-[10px] font-mono text-[#39ff14] bg-[#000] px-2 py-0.5 rounded shadow-inner border border-[#111]">100%</span>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col bg-transparent relative min-w-0">
            <div class="flex-1 p-8 overflow-y-auto">
                <div class="flex gap-10 w-full max-w-[1600px] mx-auto items-stretch">
                    
                    <div class="flex-[2] flex flex-col">
                        <div class="flex items-center justify-between mb-6 shrink-0">
                            <h2 class="text-xl font-black text-gray-200 flex items-center gap-2 tracking-wide">
                                <i class="ph-fill ph-music-notes-simple text-[#ff003c]"></i> TRACKS
                            </h2>
                            <div class="flex bg-[#000] p-1.5 rounded-xl shadow-inner gap-1 border border-[#111]" id="music-banks">
                                <button class="music-bank-tab bank-tab px-4 py-1.5 text-white rounded-lg text-xs font-bold transition-all active-bank" data-bank="A">A</button>
                                <button class="music-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="B">B</button>
                                <button class="music-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="C">C</button>
                                <button class="music-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="D">D</button>
                            </div>
                        </div>
                        <div class="recessed-lcd bg-[#050505] border-[#18181b] p-6 rounded-2xl grid grid-cols-4 gap-6 flex-1 content-start" id="grid-music"></div>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <div class="flex items-center justify-between mb-6 shrink-0">
                            <div class="flex flex-col items-start">
                                <h2 class="text-xl font-black text-gray-200 flex items-center gap-2 tracking-wide">
                                    <i class="ph-fill ph-sparkle text-[#39ff14]"></i> SOUND EFFECTS
                                </h2>
                                <span class="text-[9px] text-gray-600 uppercase font-bold tracking-widest mt-1 bg-[#000] px-2 py-0.5 rounded border border-[#111]">Double-Tap to Fade</span>
                            </div>
                            <div class="flex bg-[#000] p-1.5 rounded-xl shadow-inner gap-1 border border-[#111]" id="sfx-banks">
                                <button class="sfx-bank-tab bank-tab px-4 py-1.5 text-black rounded-lg text-xs font-bold transition-all active-bank" data-bank="A">A</button>
                                <button class="sfx-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="B">B</button>
                                <button class="sfx-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="C">C</button>
                                <button class="sfx-bank-tab bank-tab px-4 py-1.5 text-gray-500 rounded-lg text-xs font-bold transition-all" data-bank="D">D</button>
                            </div>
                        </div>
                        <div class="recessed-lcd bg-[#050505] border-[#18181b] p-6 rounded-2xl grid grid-cols-2 gap-6 mb-6 shrink-0" id="grid-sfx"></div>

                        <!-- Integrated 80s LCD Hardware Module -->
                        <div class="recessed-lcd bg-[#050505] border-[#18181b] p-5 rounded-2xl flex items-center justify-between shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] mt-auto shrink-0">
                            <div class="flex flex-col gap-3 shrink-0">
                                <button class="lcd-mode-btn active text-[10px] font-black uppercase tracking-widest px-2 py-2 rounded transition-all w-20 text-center" id="btn-clock-mode">CLOCK</button>
                                <button class="lcd-mode-btn text-[10px] font-black uppercase tracking-widest px-2 py-2 rounded transition-all w-20 text-center" id="btn-timer-mode">TIMER</button>
                            </div>
                            
                            <div class="lcd-retro-screen h-16 flex-1 mx-5 flex flex-col items-center justify-center text-3xl lg:text-4xl font-black cursor-pointer shadow-inner min-w-[240px]" id="lcd-display" title="Click to Start/Pause Timer">
                                <div class="w-full text-center">
                                    <span class="lcd-digit tabular-nums" id="lcd-text">00:00:00</span>
                                </div>
                            </div>

                            <div class="flex flex-col items-center justify-center gap-2 shrink-0 w-16">
                                <span class="text-[9px] text-gray-600 font-black tracking-widest uppercase">Reset</span>
                                <div class="w-8 h-8 rounded-full bg-[#ff003c] shadow-[inset_0_2px_4px_rgba(255,255,255,0.3),inset_0_-2px_4px_rgba(0,0,0,0.8),0_0_10px_rgba(255,0,60,0.3)] cursor-pointer hover:brightness-125 border-2 border-[#111] active:translate-y-1 transition-transform" id="btn-lcd-action" title="Reset Timer"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="h-64 raised-panel border-t border-[#000] p-6 flex flex-col shrink-0 z-40">
                <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                    <span class="text-sm font-black text-gray-300 uppercase tracking-widest flex items-center gap-2">
                        <i class="ph-fill ph-presentation-chart text-[#00f0ff] text-lg"></i> Sequence Tray
                        <span id="hint-double-click" class="ml-2 text-[10px] text-gray-600 font-bold bg-[#000] px-2 py-1 rounded">(Double-click to edit · Drag to reorder)</span>
                    </span>
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-bold text-gray-500 bg-[#000] px-3 py-1 rounded-full shadow-inner border border-[#111]" id="slide-status">Select a pad to view</span>
                        <button id="btn-record-timings" class="hidden pad-base bg-[#ff003c]/20 text-[#ff003c] border border-[#ff003c]/50 hover:bg-[#ff003c] hover:text-white px-4 py-2 rounded-lg transition-all text-xs font-black uppercase tracking-widest shrink-0 items-center gap-2 shadow-[0_4px_rgba(0,0,0,0.3)] active:translate-y-1 active:shadow-none">
                            <i class="ph-fill ph-record text-lg"></i> Record Timings
                        </button>
                    </div>
                </div>
                <div class="flex-1 relative min-w-0">
                    <div id="slide-track" class="absolute inset-0 overflow-x-auto overflow-y-hidden recessed-lcd bg-[#050505] rounded-xl p-4 gap-5 flex flex-row items-center cursor-ew-resize">
                        <div class="text-gray-700 font-bold uppercase tracking-widest w-full text-center">Tray Empty</div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast-container" class="fixed top-20 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>
    <div id="loading-overlay" class="fixed inset-0 bg-[#09090b]/90 z-50 hidden flex-col items-center justify-center backdrop-blur-md">
        <i class="ph-fill ph-spinner-gap text-[#00f0ff] text-6xl animate-spin mb-6 drop-shadow-[0_0_15px_rgba(0,240,255,0.5)]"></i>
        <h2 class="text-2xl font-black text-white tracking-widest uppercase" id="loading-text">Processing</h2>
    </div>

    <script>
        function showToast(msg, isError = true) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colorClass = isError ? 'bg-[#ff003c]' : 'bg-[#39ff14]';
            const shadowColor = isError ? '#990024' : '#1b800a';
            const textColor = isError ? 'text-white' : 'text-black';
            
            toast.className = `pad-base px-6 py-3 rounded-full ${textColor} font-black tracking-wide text-sm flex items-center gap-2 transition-all duration-300 transform translate-x-20 opacity-0 pointer-events-auto ${colorClass}`;
            toast.style.boxShadow = `0 4px ${shadowColor}, 0 10px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.5)`;
            toast.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle' : 'ph-check-circle'} text-xl"></i> ${msg}`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.remove('translate-x-20', 'opacity-0'));
            setTimeout(() => { toast.classList.add('translate-x-20', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // LCD Clock/Timer Logic
        let lcdMode = 'clock'; let timerSeconds = 0; let timerRunning = false;
        const domClockBtn = document.getElementById('btn-clock-mode');
        const domTimerBtn = document.getElementById('btn-timer-mode');
        const domLcdDisplay = document.getElementById('lcd-display');
        const domLcdText = document.getElementById('lcd-text');
        const domLcdAction = document.getElementById('btn-lcd-action');

        function updateLcdDisplay() {
            if (lcdMode === 'clock') {
                const now = new Date();
                let h = now.getHours(); let m = now.getMinutes().toString().padStart(2, '0'); let s = now.getSeconds().toString().padStart(2, '0');
                h = h % 12 || 12; h = h.toString().padStart(2, '0');
                domLcdText.innerText = `${h}:${m}:${s}`;
            } else {
                let h = Math.floor(timerSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((timerSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (timerSeconds % 60).toString().padStart(2, '0');
                domLcdText.innerText = `${h}:${m}:${s}`;
            }
            if(lcdMode === 'timer' && timerRunning) domLcdText.style.opacity = (timerSeconds % 2 === 0) ? '1' : '0.8';
            else domLcdText.style.opacity = '1';
        }

        setInterval(() => {
            if (lcdMode === 'clock') updateLcdDisplay();
            if (timerRunning) { timerSeconds++; if (lcdMode === 'timer') updateLcdDisplay(); }
        }, 1000);

        domClockBtn.addEventListener('click', () => { lcdMode = 'clock'; domClockBtn.classList.add('active'); domTimerBtn.classList.remove('active'); updateLcdDisplay(); });
        domTimerBtn.addEventListener('click', () => { lcdMode = 'timer'; domTimerBtn.classList.add('active'); domClockBtn.classList.remove('active'); updateLcdDisplay(); });
        domLcdDisplay.addEventListener('click', () => { if (lcdMode === 'timer') { timerRunning = !timerRunning; updateLcdDisplay(); } });
        domLcdAction.addEventListener('click', () => { if (lcdMode === 'timer') { timerSeconds = 0; timerRunning = false; updateLcdDisplay(); showToast("Timer Reset", false); } });
        updateLcdDisplay();

        // --- Core Engine Data ---
        const AppState = { mode: 'edit', pads: {}, activeMusicPadId: null, activePadForEdit: null, isAudioReady: false, isRecording: false, clipboardSlide: null, projectorWindow: null, recordingSlideIndex: 0, activePerformSlideIndex: -1 };
        const NUM_MUSIC_PADS = 16; const NUM_SFX_PADS = 6;
        const masterGain = new Tone.Gain(1).toDestination();
        const analyser = new Tone.Analyser("fft", 64); masterGain.connect(analyser);
        const musicGain = new Tone.Gain(0.8).connect(masterGain);
        const sfxGain = new Tone.Gain(1).connect(masterGain);

        // Synthwave Palette Hex Codes
        const PAD_COLORS = {
            crimson: { primary: '#ff003c', secondary: '#b3002a', light: '#ff1a53', shadow: '#660018', glow: 'rgba(255,0,60,0.6)', text: '#ffffff' },
            lime:    { primary: '#39ff14', secondary: '#22990c', light: '#5cff3d', shadow: '#114d06', glow: 'rgba(57,255,20,0.6)', text: '#000000' },
            cyan:    { primary: '#00f0ff', secondary: '#008b99', light: '#33f3ff', shadow: '#004a52', glow: 'rgba(0,240,255,0.6)', text: '#000000' },
            purple:  { primary: '#b5179e', secondary: '#7209b7', light: '#d030b8', shadow: '#3a0ca3', glow: 'rgba(181,23,158,0.6)', text: '#ffffff' },
            orange:  { primary: '#fb5607', secondary: '#b33c04', light: '#ff6a20', shadow: '#662202', glow: 'rgba(251,86,7,0.6)', text: '#ffffff' },
            pink:    { primary: '#ff006e', secondary: '#cc0058', light: '#ff1a7e', shadow: '#800037', glow: 'rgba(255,0,110,0.6)', text: '#ffffff' },
            blue:    { primary: '#4361ee', secondary: '#2f43a6', light: '#5b76f2', shadow: '#1d2a6b', glow: 'rgba(67,97,238,0.6)', text: '#ffffff' },
            gold:    { primary: '#ffbe0b', secondary: '#b38507', light: '#ffc82a', shadow: '#664c04', glow: 'rgba(255,190,11,0.6)', text: '#000000' }
        };

        function createPadDOM(id, type, container, bank = null) {
            AppState.pads[id] = { id, type, name: 'Empty Pad', base64: null, slides: [], timings: [], isPlaying: false, isPaused: false, colorTheme: null };
            const div = document.createElement('div');
            div.id = `pad-${id}`;
            div.className = `pad-base pad-empty h-24 flex flex-col items-center justify-center cursor-pointer p-2 text-center group select-none relative`;
            if (bank) { div.dataset.bank = bank; if (bank !== 'A') div.classList.add('hidden'); }
            
            // Build Color Swatches
            let swatchesHtml = '';
            for (const [key, colors] of Object.entries(PAD_COLORS)) {
                swatchesHtml += `<div class="w-4 h-4 rounded-full cursor-pointer hover:scale-125 transition-transform" style="background-color: ${colors.primary}; box-shadow: 0 0 5px ${colors.primary}" data-color="${key}"></div>`;
            }

            div.innerHTML = `
                <i class="ph-fill ${type === 'music' ? 'ph-music-notes' : 'ph-sparkle'} text-3xl text-gray-500 mb-1 icon-default"></i>
                <span class="text-[10px] font-black text-gray-500 pad-name uppercase tracking-wider px-2 w-full truncate">Empty</span>
                <div class="absolute inset-0 bg-black/80 rounded-[16px] flex-col items-center justify-center gap-2 hidden group-hover:flex edit-ui backdrop-blur-sm z-10 transition-all border border-gray-800">
                    <button class="bg-[#00f0ff] hover:bg-[#33f3ff] text-black text-[10px] font-black px-4 py-1.5 rounded-md pointer-events-auto btn-upload shadow-[0_3px_#009099] active:translate-y-px active:shadow-none">Load</button>
                    <button class="bg-[#ff003c] hover:bg-[#ff3363] text-white text-[10px] font-black px-4 py-1.5 rounded-md hidden pointer-events-auto btn-clear shadow-[0_3px_#990024] active:translate-y-px active:shadow-none">Clear</button>
                    
                    <button class="absolute bottom-2 right-2 text-gray-400 hover:text-white pointer-events-auto btn-color-toggle hidden" title="Change Pad Color">
                        <i class="ph-fill ph-palette text-lg"></i>
                    </button>
                    <div class="color-picker-menu absolute bottom-8 right-2 bg-[#111] border border-gray-700 p-2 rounded-xl grid-cols-4 gap-2 z-20 pointer-events-auto shadow-[0_5px_15px_rgba(0,0,0,0.9)]">
                        ${swatchesHtml}
                    </div>

                    <input type="file" accept="audio/*" class="hidden">
                </div>
            `;
            container.appendChild(div);

            div.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON' && !e.target.closest('.color-picker-menu') && !e.target.closest('.btn-color-toggle')) div.classList.add('pressed'); });
            div.addEventListener('mouseup', () => div.classList.remove('pressed'));
            div.addEventListener('mouseleave', () => div.classList.remove('pressed'));

            div.addEventListener('click', (e) => {
                if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.closest('.color-picker-menu') || e.target.closest('.btn-color-toggle')) return;
                if(AppState.isRecording) return;
                if(AppState.mode === 'edit') selectPadForEdit(id);
                else if(AppState.mode === 'perform' && AppState.isAudioReady) triggerPad(id);
            });
            div.querySelector('.btn-upload').addEventListener('click', (e) => { e.stopPropagation(); div.querySelector('input').click(); });
            div.querySelector('.btn-clear').addEventListener('click', (e) => { e.stopPropagation(); clearPad(id); });
            div.querySelector('input').addEventListener('change', (e) => { 
                if(e.target.files.length > 0) loadAudio(id, e.target.files[0]);
            });

            const colorToggle = div.querySelector('.btn-color-toggle');
            const colorMenu = div.querySelector('.color-picker-menu');
            colorToggle.addEventListener('click', (e) => { e.stopPropagation(); if(AppState.pads[id].base64) colorMenu.classList.toggle('active'); });
            div.querySelectorAll('.color-picker-menu div').forEach(swatch => {
                swatch.addEventListener('click', (e) => {
                    e.stopPropagation();
                    AppState.pads[id].colorTheme = e.target.dataset.color;
                    colorMenu.classList.remove('active'); updatePadUI(id);
                });
            });
            div.addEventListener('mouseleave', () => colorMenu.classList.remove('active'));
        }

        async function loadAudio(id, file) {
            showLoading("Loading Audio...");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const pad = AppState.pads[id];
                pad.base64 = e.target.result;
                pad.name = file.name.replace(/\.[^/.]+$/, "");
                
                if(pad.player) { pad.player.dispose(); if(pad.gainNode) pad.gainNode.dispose(); }
                pad.player = new Tone.Player({ url: pad.base64, onload: () => { 
                    if (pad.type === 'music') pad.player.connect(musicGain);
                    else { pad.gainNode = new Tone.Gain(1).connect(sfxGain); pad.player.connect(pad.gainNode); }
                    updatePadUI(id); selectPadForEdit(id); hideLoading(); 
                }});
            };
            reader.onerror = () => { showToast("Error reading file", true); hideLoading(); }
            reader.readAsDataURL(file);
        }

        function clearPad(id) {
            const pad = AppState.pads[id];
            if(pad.player) { if(pad.type === 'music') pad.player.unsync(); pad.player.dispose(); }
            if(pad.gainNode) pad.gainNode.dispose();
            pad.player = null; pad.gainNode = null; pad.base64 = null; pad.name = 'Empty Pad'; pad.slides = []; pad.timings = []; pad.isPlaying = false; pad.isPaused = false; pad.colorTheme = null;
            if(AppState.activeMusicPadId === id) stopMusic();
            if(AppState.activePadForEdit === id) renderSlideTrack(null);
            updatePadUI(id);
        }

        function applyCustomPadColor(div, themeKey) {
            if(!PAD_COLORS[themeKey]) return false;
            const c = PAD_COLORS[themeKey];
            div.style.setProperty('--pad-primary', c.primary);
            div.style.setProperty('--pad-secondary', c.secondary);
            div.style.setProperty('--pad-light', c.light);
            div.style.setProperty('--pad-shadow', c.shadow);
            div.style.setProperty('--pad-glow', c.glow);
            div.style.setProperty('--pad-text', c.text);
            div.classList.add('pad-custom-color');
            return true;
        }

        function updatePadUI(id) {
            const pad = AppState.pads[id];
            const div = document.getElementById(`pad-${id}`);
            const icon = div.querySelector('.icon-default');
            const colorToggleBtn = div.querySelector('.btn-color-toggle');
            const nameEl = div.querySelector('.pad-name');
            
            div.classList.remove('pad-empty', 'pad-music', 'pad-sfx', 'playing-active', 'paused', 'pad-custom-color');
            div.style.removeProperty('--pad-primary'); div.style.removeProperty('--pad-secondary');
            
            if (pad.base64) {
                colorToggleBtn.classList.remove('hidden');
                
                if (pad.colorTheme && PAD_COLORS[pad.colorTheme]) {
                    applyCustomPadColor(div, pad.colorTheme);
                } else {
                    div.classList.add(`pad-${pad.type}`);
                    if(pad.type === 'sfx') { icon.classList.replace('text-gray-500', 'text-black'); nameEl.classList.replace('text-gray-500', 'text-black'); }
                    else { icon.classList.replace('text-gray-500', 'text-white'); nameEl.classList.replace('text-gray-500', 'text-white'); }
                }
                
                div.querySelector('.btn-clear').classList.remove('hidden');
                
                if (pad.isPlaying) {
                    div.classList.add('playing-active');
                    if (pad.isPaused) div.classList.add('paused');
                }
            } else {
                div.classList.add('pad-empty');
                div.querySelector('.btn-clear').classList.add('hidden');
                colorToggleBtn.classList.add('hidden');
                icon.classList.replace('text-black', 'text-gray-500'); icon.classList.replace('text-white', 'text-gray-500');
                nameEl.classList.replace('text-black', 'text-gray-500'); nameEl.classList.replace('text-white', 'text-gray-500');
            }
            nameEl.innerText = pad.name;
            div.style.border = (AppState.mode === 'edit' && AppState.activePadForEdit === id && !AppState.isRecording) ? '2px solid #ffd700' : 'none';
        }

        function toggleRecording() {
            if (!AppState.activePadForEdit) return;
            const pad = AppState.pads[AppState.activePadForEdit];
            if (pad.slides.length === 0) { showToast("Add at least one slide to record timings.", true); return; }
            if (AppState.isRecording) stopRecording();
            else startRecording(pad);
        }

        function startRecording(pad) {
            AppState.isRecording = true; AppState.recordingSlideIndex = 0; pad.timings = pad.slides.map(() => null); 
            
            const btnRec = document.getElementById('btn-record-timings');
            btnRec.classList.replace('bg-[#ff003c]/20', 'bg-[#ff003c]'); btnRec.classList.replace('text-[#ff003c]', 'text-white'); btnRec.classList.replace('border-[#ff003c]/50', 'border-[#ff003c]');
            btnRec.innerHTML = '<i class="ph-fill ph-stop text-lg"></i> Stop Rec'; btnRec.classList.add('animate-pulse');
            document.getElementById('slide-status').innerHTML = `<span class="text-[#ff003c] font-black tracking-widest">RECORDING IN PROGRESS</span>`;

            if (AppState.activeMusicPadId && AppState.activeMusicPadId !== pad.id) {
                const oldPad = AppState.pads[AppState.activeMusicPadId];
                if(oldPad.player) oldPad.player.unsync(); oldPad.isPlaying = false; updatePadUI(oldPad.id);
            }

            Tone.Transport.stop(); Tone.Transport.position = 0;
            if (pad.player) pad.player.sync().start(0);
            
            document.getElementById('now-playing-title').innerText = pad.name;
            const pIcon = document.getElementById('playing-icon');
            pIcon.style.opacity = '1'; pIcon.classList.replace('text-[#00f0ff]', 'text-[#ff003c]'); 
            
            if (pad.slides.length > 0) { pad.timings[0] = 0.0; AppState.recordingSlideIndex = 1; syncProjector(pad.slides[0]); }
            
            Tone.Transport.start(); pad.isPlaying = true; AppState.activeMusicPadId = pad.id; renderSlideTrack(pad.id);
            if (AppState.recordingSlideIndex >= pad.slides.length) stopRecording();
        }

        function stopRecording() {
            AppState.isRecording = false;
            const btnRec = document.getElementById('btn-record-timings');
            btnRec.classList.replace('bg-[#ff003c]', 'bg-[#ff003c]/20'); btnRec.classList.replace('text-white', 'text-[#ff003c]'); btnRec.classList.replace('border-[#ff003c]', 'border-[#ff003c]/50');
            btnRec.innerHTML = '<i class="ph-fill ph-record text-lg"></i> Record Timings'; btnRec.classList.remove('animate-pulse');
            document.getElementById('playing-icon').classList.replace('text-[#ff003c]', 'text-[#00f0ff]');
            stopMusic(); renderSlideTrack(AppState.activePadForEdit);
        }

        function recordNextTiming() {
            if (!AppState.isRecording || !AppState.activeMusicPadId) return;
            const pad = AppState.pads[AppState.activeMusicPadId];
            if (AppState.recordingSlideIndex < pad.slides.length) {
                pad.timings[AppState.recordingSlideIndex] = Tone.Transport.seconds; 
                syncProjector(pad.slides[AppState.recordingSlideIndex]); 
                AppState.recordingSlideIndex++; renderSlideTrack(pad.id);
                if (AppState.recordingSlideIndex >= pad.slides.length) stopRecording(); 
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
                e.preventDefault(); 
                if (AppState.isRecording) recordNextTiming();
            }
        });

        function triggerPad(id) {
            const pad = AppState.pads[id];
            if (!pad.player || !pad.player.loaded) return;

            if (pad.type === 'music') {
                if (AppState.activeMusicPadId === id) {
                    if (Tone.Transport.state === "paused") {
                        Tone.Transport.start(); pad.isPaused = false;
                        const pi = document.getElementById('playing-icon');
                        pi.classList.replace('animate-none', 'animate-pulse'); pi.classList.replace('text-[#ffd700]', 'text-[#00f0ff]'); pi.style.opacity = '1';
                    } else { Tone.Transport.stop(); Tone.Transport.position = 0; Tone.Transport.start(); AppState.activePerformSlideIndex = -1; }
                } else {
                    if (AppState.activeMusicPadId) {
                        const oldPad = AppState.pads[AppState.activeMusicPadId];
                        if(oldPad.player) oldPad.player.unsync(); oldPad.isPlaying = false; oldPad.isPaused = false; updatePadUI(oldPad.id);
                    }
                    Tone.Transport.stop(); Tone.Transport.position = 0; pad.player.sync().start(0); 

                    document.getElementById('now-playing-title').innerText = pad.name;
                    const pi = document.getElementById('playing-icon');
                    pi.classList.remove('animate-none', 'text-[#ffd700]'); pi.classList.add('animate-pulse', 'text-[#00f0ff]'); pi.style.opacity = '1';
                    
                    Tone.Transport.start(); pad.isPlaying = true; pad.isPaused = false; AppState.activeMusicPadId = id; AppState.activePerformSlideIndex = -1;
                    if (AppState.mode === 'perform') renderSlideTrack(id);
                }
            } else {
                if (pad.isPlaying && !pad.isFading) {
                    pad.isFading = true; updatePadUI(id); pad.gainNode.gain.rampTo(0, 1);
                    setTimeout(() => { pad.player.stop(); pad.isPlaying = false; pad.isFading = false; updatePadUI(id); }, 1000);
                } else if (!pad.isPlaying) {
                    pad.gainNode.gain.value = 1; pad.player.start(); pad.isPlaying = true;
                    if (AppState.mode === 'perform') renderSlideTrack(id);
                    pad.player.onstop = () => { pad.isPlaying = false; updatePadUI(id); };
                }
            }
            updatePadUI(id);
        }

        function stopMusic() {
            Tone.Transport.stop();
            if(AppState.activeMusicPadId) {
                const p = AppState.pads[AppState.activeMusicPadId];
                if(p.player) p.player.unsync(); p.isPlaying = false; p.isPaused = false; updatePadUI(p.id);
            }
            AppState.activeMusicPadId = null; AppState.activePerformSlideIndex = -1;
            document.getElementById('now-playing-title').innerText = '---';
            const pi = document.getElementById('playing-icon');
            pi.classList.remove('animate-none', 'text-[#ffd700]'); pi.classList.add('animate-pulse', 'text-[#00f0ff]'); pi.style.opacity = '0.2';
            document.getElementById('scrubber-fill').style.width = '0%'; document.getElementById('time-current').innerText = '0:00'; document.getElementById('time-total').innerText = '0:00';
        }

        function selectPadForEdit(id) { AppState.activePadForEdit = id; renderSlideTrack(id); Object.keys(AppState.pads).forEach(pid => updatePadUI(pid)); }

        function fitEditorText(el) { let size = 5.0; el.style.fontSize = size + 'cqw'; while (el.scrollHeight > el.clientHeight && size > 1.5) { size -= 0.1; el.style.fontSize = size + 'cqw'; } }

        function openSlideEditor(index) {
            AppState.editingSlideIndex = index; const pad = AppState.pads[AppState.activePadForEdit];
            document.getElementById('slide-editor-textarea').value = pad.slides[index] || '';
            document.getElementById('slide-editor-overlay').classList.remove('hidden'); document.getElementById('slide-editor-overlay').classList.add('flex');
            document.getElementById('slide-editor-textarea').focus(); fitEditorText(document.getElementById('slide-editor-textarea'));
        }

        function closeSlideEditor() { document.getElementById('slide-editor-overlay').classList.add('hidden'); document.getElementById('slide-editor-overlay').classList.remove('flex'); AppState.editingSlideIndex = null; }

        document.getElementById('slide-editor-textarea').addEventListener('input', (e) => {
            fitEditorText(e.target);
            if (AppState.activePadForEdit && AppState.editingSlideIndex !== null) {
                AppState.pads[AppState.activePadForEdit].slides[AppState.editingSlideIndex] = e.target.value;
                const thumbText = document.getElementById(`thumb-text-${AppState.editingSlideIndex}`);
                if(thumbText) thumbText.innerText = e.target.value || '(Empty Slide)';
            }
        });

        let draggedSlideIndex = null;

        function renderSlideTrack(id) {
            const trk = document.getElementById('slide-track'); trk.innerHTML = '';
            const status = document.getElementById('slide-status'); const btnRec = document.getElementById('btn-record-timings');
            
            if (!id || !AppState.pads[id]) {
                trk.innerHTML = '<div class="text-gray-700 font-bold uppercase tracking-widest w-full text-center">Tray Empty</div>';
                status.innerText = "No pad selected"; btnRec.classList.add('hidden'); return;
            }

            const pad = AppState.pads[id];
            
            if (AppState.mode === 'edit') {
                btnRec.classList.remove('hidden');
                if(!AppState.isRecording) status.innerHTML = `Editing: <span class="text-[#00f0ff] font-black">${pad.name || 'Empty'}</span>`;

                pad.slides.forEach((slideText, index) => {
                    const wrap = document.createElement('div');
                    wrap.className = "shrink-0 w-64 h-40 relative group select-none transition-transform";
                    const isArmed = AppState.isRecording && AppState.recordingSlideIndex === index;
                    const hasTiming = pad.timings && pad.timings[index] !== null && pad.timings[index] !== undefined;

                    if(!AppState.isRecording) {
                        wrap.draggable = true;
                        wrap.addEventListener('dragstart', (e) => { draggedSlideIndex = index; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => wrap.classList.add('slide-drag-active'), 0); });
                        wrap.addEventListener('dragend', () => { wrap.classList.remove('slide-drag-active'); draggedSlideIndex = null; });
                        wrap.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; slidePreview.style.boxShadow = '-4px 0 0 #00f0ff'; });
                        wrap.addEventListener('dragleave', () => { slidePreview.style.boxShadow = ''; });
                        wrap.addEventListener('drop', (e) => {
                            e.preventDefault(); slidePreview.style.boxShadow = '';
                            if (draggedSlideIndex === null || draggedSlideIndex === index) return;
                            const slideToMove = pad.slides.splice(draggedSlideIndex, 1)[0]; const timingToMove = pad.timings.splice(draggedSlideIndex, 1)[0];
                            pad.slides.splice(index, 0, slideToMove); pad.timings.splice(index, 0, timingToMove); renderSlideTrack(id);
                        });
                    }

                    const label = document.createElement('div');
                    label.className = `absolute top-3 left-3 text-[10px] px-2 py-0.5 rounded font-black z-10 pointer-events-none transition-all shadow-sm ${isArmed ? 'bg-[#ff003c] text-white' : 'bg-[#e2e8f0] text-black'}`;
                    if (isArmed) label.innerText = `[ARMED] Slide ${index + 1}`;
                    else if (hasTiming) { label.innerText = `[${formatTime(pad.timings[index])}] Slide ${index + 1}`; label.classList.replace('bg-[#e2e8f0]', 'bg-[#39ff14]'); } 
                    else label.innerText = `Slide ${index + 1}`;
                    
                    const slidePreview = document.createElement('div'); slidePreview.id = `thumb-text-${index}`;
                    let baseClass = "w-full h-full p-4 pt-10 text-[11px] font-bold leading-snug overflow-hidden cursor-pointer transition-all text-center whitespace-pre-wrap flex flex-col items-center justify-start pointer-events-auto rounded-xl ";
                    if (isArmed) baseClass += "slide-polaroid-dark border-[#ff003c] border-2 shadow-[0_0_30px_rgba(255,0,60,0.6)] scale-105 z-20 text-white ";
                    else baseClass += "slide-polaroid hover:border-[#00f0ff] hover:-translate-y-1 hover:shadow-lg ";
                    
                    slidePreview.className = baseClass; slidePreview.innerText = slideText || '(Empty Slide)';
                    slidePreview.addEventListener('click', () => { if (AppState.isRecording && isArmed) recordNextTiming(); });
                    slidePreview.addEventListener('dblclick', () => { if(!AppState.isRecording) openSlideEditor(index); });
                    
                    const btnStyle = "absolute bg-[#000] hover:bg-[#111] border border-[#333] text-white rounded-md w-7 h-7 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-20 pointer-events-auto shadow-md";
                    const copyBtn = document.createElement('button'); copyBtn.className = `${btnStyle} top-3 right-12 text-[#00f0ff] hover:text-black hover:bg-[#00f0ff]`; copyBtn.innerHTML = '<i class="ph-fill ph-copy text-sm"></i>';
                    copyBtn.addEventListener('click', (e) => { e.stopPropagation(); AppState.clipboardSlide = slideText; showToast("Slide Copied!", false); });
                    
                    const delBtn = document.createElement('button'); delBtn.className = `${btnStyle} top-3 right-3 text-[#ff003c] hover:text-white hover:bg-[#ff003c]`; delBtn.innerHTML = '<i class="ph-bold ph-x text-sm"></i>';
                    delBtn.addEventListener('click', (e) => { e.stopPropagation(); pad.slides.splice(index, 1); if(pad.timings) pad.timings.splice(index, 1); renderSlideTrack(id); });

                    wrap.appendChild(slidePreview); wrap.appendChild(label);
                    if(!AppState.isRecording) { wrap.appendChild(copyBtn); wrap.appendChild(delBtn); }
                    trk.appendChild(wrap);

                    if (isArmed) setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }), 50);
                });

                if (!AppState.isRecording) {
                    const btnStyle = "shrink-0 w-32 h-40 border-2 border-dashed border-[#333] rounded-xl flex flex-col items-center justify-center text-gray-600 hover:text-[#00f0ff] hover:border-[#00f0ff] hover:bg-[#00f0ff]/10 transition-all focus:outline-none font-black uppercase tracking-widest text-[10px]";
                    const addBtn = document.createElement('button'); addBtn.className = btnStyle; addBtn.innerHTML = '<i class="ph-bold ph-plus text-3xl mb-2"></i> Add';
                    addBtn.addEventListener('click', () => { pad.slides.push(""); pad.timings.push(null); renderSlideTrack(id); setTimeout(() => trk.scrollLeft = trk.scrollWidth, 50); });
                    trk.appendChild(addBtn);

                    const pasteBtn = document.createElement('button'); pasteBtn.className = btnStyle; pasteBtn.innerHTML = '<i class="ph-fill ph-clipboard text-3xl mb-2"></i> Paste';
                    pasteBtn.addEventListener('click', () => {
                        if(AppState.clipboardSlide !== null) { pad.slides.push(AppState.clipboardSlide); pad.timings.push(null); renderSlideTrack(id); setTimeout(() => trk.scrollLeft = trk.scrollWidth, 50); } 
                        else showToast("No slide copied to paste.", true);
                    });
                    trk.appendChild(pasteBtn);
                }
            } else {
                btnRec.classList.add('hidden'); status.innerHTML = `Presenting: <span class="text-[#00f0ff] font-black">${pad.name || 'Empty'}</span>`;
                if (pad.slides.length === 0) { trk.innerHTML = '<div class="text-gray-600 font-bold uppercase tracking-widest w-full text-center">No slides assigned.</div>'; return; }

                pad.slides.forEach((slideText, index) => {
                    const btn = document.createElement('button'); btn.className = "slide-btn shrink-0 w-64 h-40 text-left p-4 pt-10 rounded-xl slide-polaroid-dark transition-all relative overflow-hidden group focus:outline-none border-2 border-transparent"; btn.dataset.index = index; 
                    const label = document.createElement('div'); label.className = "absolute top-3 left-3 bg-[#050505] text-[10px] font-black px-2 py-1 rounded text-[#00f0ff] z-10 shadow-sm border border-[#111]"; label.innerText = `Slide ${index + 1}`;
                    const textPreview = document.createElement('div'); textPreview.className = "line-clamp-4 whitespace-pre-wrap font-bold pointer-events-none text-center leading-relaxed text-[11px]"; textPreview.innerText = slideText;
                    
                    btn.appendChild(label); btn.appendChild(textPreview);
                    btn.addEventListener('click', () => {
                        AppState.activePerformSlideIndex = index; 
                        document.querySelectorAll('.slide-btn').forEach(b => { b.classList.remove('border-[#00f0ff]', 'bg-[#00f0ff]/10', 'scale-[1.03]', 'shadow-[0_0_30px_rgba(0,240,255,0.3)]', 'z-10'); });
                        btn.classList.add('border-[#00f0ff]', 'bg-[#00f0ff]/10', 'scale-[1.03]', 'shadow-[0_0_30px_rgba(0,240,255,0.3)]', 'z-10');
                        btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                        syncProjector(slideText);
                    });
                    trk.appendChild(btn);
                });

                const hasTimings = pad.timings && pad.timings.some(t => t !== null);
                if (!hasTimings) { 
                    const firstBtn = trk.querySelector('.slide-btn'); 
                    if(firstBtn) firstBtn.click(); 
                    else syncProjector('Slides will display here.'); 
                } else {
                    if (pad.timings[0] === 0 || pad.timings[0] === 0.0) {
                        const firstBtn = trk.querySelector('.slide-btn');
                        if (firstBtn) firstBtn.click();
                    } else syncProjector('Slides will display here.');
                }
            }
        }

        document.getElementById('btn-projector').addEventListener('click', () => {
            if(AppState.projectorWindow && !AppState.projectorWindow.closed) { AppState.projectorWindow.focus(); return; }
            AppState.projectorWindow = window.open('', 'EduPlayProjector', 'width=1024,height=768,menubar=no,toolbar=no,location=no,status=no');
            if(!AppState.projectorWindow) { showToast("Projector Pop-up blocked!", true); return; }

            AppState.projectorWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Projector View</title>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');
                        body { background-color: #000; margin: 0; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; }
                        .projector-canvas { background-color: #000; width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.77vh; container-type: inline-size; position: relative; }
                        #content { position: absolute; inset: 0; font-family: 'Nunito', system-ui, sans-serif; font-weight: 900; padding: 5cqw; color: #fff; white-space: pre-wrap; line-height: 1.4; text-align: center; box-sizing: border-box; overflow: hidden; }
                    </style>
                </head>
                <body>
                    <div class="projector-canvas"><div id="content"></div></div>
                    <script>
                        function setText(text) {
                            const content = document.getElementById('content'); content.innerText = text;
                            let size = 5.0; content.style.fontSize = size + 'cqw';
                            while (content.scrollHeight > content.clientHeight && size > 1.5) { size -= 0.1; content.style.fontSize = size + 'cqw'; }
                        }
                        window.setText = setText;
                    <\/script>
                </body>
                </html>
            `);
            AppState.projectorWindow.document.close();
            const bp = document.getElementById('btn-projector'); bp.classList.add('pad-sfx'); bp.classList.remove('pad-empty'); 

            setTimeout(() => {
                 if (AppState.activeMusicPadId && AppState.mode === 'perform') {
                     const pad = AppState.pads[AppState.activeMusicPadId];
                     const hasTimings = pad.timings && pad.timings.some(t => t !== null);
                     if (AppState.activePerformSlideIndex >= 0 && pad.slides[AppState.activePerformSlideIndex]) syncProjector(pad.slides[AppState.activePerformSlideIndex]);
                     else if (pad.slides.length > 0 && (!hasTimings || pad.timings[0] === 0)) syncProjector(pad.slides[0]);
                     else syncProjector("Slides will display here."); 
                 } else syncProjector("Slides will display here.");
            }, 100);
        });

        function syncProjector(text) {
            if(AppState.projectorWindow && !AppState.projectorWindow.closed) {
                if (typeof AppState.projectorWindow.setText === 'function') AppState.projectorWindow.setText(text || '');
                else { const c = AppState.projectorWindow.document.getElementById('content'); if(c) c.innerText = text || ''; }
            } else { const bp = document.getElementById('btn-projector'); bp.classList.remove('pad-sfx'); bp.classList.add('pad-empty'); }
        }

        function formatTime(seconds) {
            if(seconds === null || seconds === undefined) return '--:--';
            const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60).toString().padStart(2, '0'); return `${m}:${s}`;
        }

        function updateScrubberLoop() {
            if (AppState.activeMusicPadId && (Tone.Transport.state === "started" || Tone.Transport.state === "paused")) {
                const pad = AppState.pads[AppState.activeMusicPadId];
                if (pad && pad.player && pad.player.loaded) {
                    const dur = pad.player.buffer.duration; const cur = Tone.Transport.seconds;
                    document.getElementById('time-total').innerText = formatTime(dur); document.getElementById('time-current').innerText = formatTime(cur);
                    const pct = (cur / dur) * 100;
                    document.getElementById('scrubber-fill').style.width = `${Math.min(pct, 100)}%`; document.getElementById('scrubber-input').value = pct;

                    if (AppState.mode === 'perform' && pad.timings && pad.timings.length > 0) {
                        const nextIdx = AppState.activePerformSlideIndex + 1;
                        if (nextIdx < pad.timings.length && pad.timings[nextIdx] !== null) {
                            if (cur >= pad.timings[nextIdx]) { const btns = document.getElementById('slide-track').querySelectorAll('.slide-btn'); if (btns[nextIdx]) btns[nextIdx].click(); }
                        }
                    }
                    if (cur >= dur) { stopMusic(); if (AppState.isRecording) stopRecording(); }
                }
            }
            requestAnimationFrame(updateScrubberLoop);
        }

        document.getElementById('scrubber-input').addEventListener('input', (e) => {
            if(AppState.activeMusicPadId && !AppState.isRecording) {
                const pad = AppState.pads[AppState.activeMusicPadId];
                if(pad && pad.player && pad.player.loaded) {
                    const dur = pad.player.buffer.duration; const pct = parseFloat(e.target.value) / 100;
                    Tone.Transport.seconds = dur * pct; 
                    
                    if (AppState.mode === 'perform' && pad.timings) {
                        let newIdx = -1;
                        for (let i = 0; i < pad.timings.length; i++) {
                            if (pad.timings[i] !== null && Tone.Transport.seconds >= pad.timings[i]) newIdx = i;
                        }
                        if (newIdx !== AppState.activePerformSlideIndex && newIdx !== -1) {
                            const btns = document.getElementById('slide-track').querySelectorAll('.slide-btn');
                            if (btns[newIdx]) btns[newIdx].click();
                        }
                    } else AppState.activePerformSlideIndex = -1; 
                }
            }
        });

        document.getElementById('btn-stop-music').addEventListener('click', () => { if(AppState.isRecording) stopRecording(); else stopMusic(); });

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            const cv = document.getElementById('visualizer'); 
            const ctx = cv.getContext('2d'); 
            const width = cv.width = cv.offsetWidth; 
            const height = cv.height = cv.offsetHeight;
            if(!AppState.isAudioReady) return;
            
            const values = analyser.getValue(); ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = '#111'; ctx.beginPath(); ctx.moveTo(0, height/2); ctx.lineTo(width, height/2); ctx.stroke();

            const barWidth = (width / values.length) * 2; let x = 0;
            const gradient = ctx.createLinearGradient(0, height, 0, 0);
            gradient.addColorStop(0, '#00f0ff'); gradient.addColorStop(0.5, '#39ff14'); gradient.addColorStop(1, '#ff003c');   

            for (let i = 0; i < values.length; i++) {
                let normalized = (values[i] + 100) / 100; if(normalized < 0) normalized = 0;
                const barHeight = normalized * height;
                ctx.fillStyle = gradient; ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight); x += barWidth;
            }
        }

        function setupEventListeners() {
            document.getElementById('tab-edit').addEventListener('click', () => setMode('edit'));
            document.getElementById('tab-perform').addEventListener('click', () => setMode('perform'));
            document.getElementById('btn-close-slide-editor').addEventListener('click', closeSlideEditor);
            document.getElementById('btn-record-timings').addEventListener('click', toggleRecording);

            document.getElementById('btn-pause-music').addEventListener('click', () => {
                if (AppState.activeMusicPadId) {
                    const pad = AppState.pads[AppState.activeMusicPadId];
                    const pi = document.getElementById('playing-icon');
                    if (Tone.Transport.state === "started") {
                        Tone.Transport.pause(); pad.isPaused = true; updatePadUI(pad.id);
                        pi.classList.replace('animate-pulse', 'animate-none'); pi.classList.replace('text-[#00f0ff]', 'text-[#ffd700]'); pi.style.opacity = '0.8';
                    } else if (Tone.Transport.state === "paused") {
                        Tone.Transport.start(); pad.isPaused = false; updatePadUI(pad.id);
                        pi.classList.replace('animate-none', 'animate-pulse'); pi.classList.replace('text-[#ffd700]', 'text-[#00f0ff]'); pi.style.opacity = '1';
                    }
                }
            });

            function setupBankTabs(selector, padType) {
                document.querySelectorAll(selector).forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll(selector).forEach(b => { b.classList.remove('active-bank', 'text-white', 'text-black'); b.classList.add('text-gray-500'); });
                        if(padType === 'pad-music') { e.target.classList.add('active-bank', 'text-white'); e.target.classList.remove('text-gray-500'); } 
                        else { e.target.classList.add('active-bank', 'text-black'); e.target.classList.remove('text-gray-500'); }
                        
                        const bank = e.target.dataset.bank;
                        document.querySelectorAll(`.${padType}`).forEach(pad => { if (pad.dataset.bank === bank) pad.classList.remove('hidden'); else pad.classList.add('hidden'); });
                    });
                });
            }
            setupBankTabs('.music-bank-tab', 'pad-music'); setupBankTabs('.sfx-bank-tab', 'pad-sfx');

            function bindVol(slider, gainNode, labelId) {
                slider.addEventListener('input', e => {
                    const val = parseFloat(e.target.value); gainNode.gain.rampTo(val, 0.1);
                    document.getElementById(labelId).innerText = Math.round(val * 100) + '%';
                });
            }
            bindVol(document.getElementById('vol-master'), masterGain, 'val-vol-master');
            bindVol(document.getElementById('vol-music'), musicGain, 'val-vol-music');
            bindVol(document.getElementById('vol-sfx'), sfxGain, 'val-vol-sfx');

            document.getElementById('btn-save').addEventListener('click', saveProject);
            document.getElementById('btn-load').addEventListener('click', () => document.getElementById('json-upload').click());
            document.getElementById('json-upload').addEventListener('change', loadProject);
            document.getElementById('slide-track').addEventListener('wheel', (e) => { if (e.deltaY !== 0) { e.preventDefault(); document.getElementById('slide-track').scrollLeft += e.deltaY; } });
        }

        function setMode(mode) {
            if (AppState.isRecording) stopRecording();
            AppState.mode = mode;
            const te = document.getElementById('tab-edit'); const tp = document.getElementById('tab-perform');
            if(mode === 'edit') {
                te.classList.replace('text-gray-600', 'text-black'); te.classList.add('bg-[#ffd700]', 'shadow-[0_2px_0_#b39700]');
                tp.classList.replace('text-gray-300', 'text-gray-600'); tp.classList.remove('bg-[#00f0ff]', 'text-black', 'shadow-[0_2px_0_#009099]');
                document.getElementById('hint-double-click').classList.remove('hidden'); document.body.classList.remove('perform-mode');
                renderSlideTrack(AppState.activePadForEdit);
            } else {
                tp.classList.replace('text-gray-600', 'text-black'); tp.classList.add('bg-[#00f0ff]', 'shadow-[0_2px_0_#009099]');
                te.classList.replace('text-black', 'text-gray-600'); te.classList.remove('bg-[#ffd700]', 'shadow-[0_2px_0_#b39700]');
                document.getElementById('hint-double-click').classList.add('hidden'); document.body.classList.add('perform-mode');
                AppState.activePadForEdit = null; renderSlideTrack(AppState.activeMusicPadId);
            }
            Object.keys(AppState.pads).forEach(pid => updatePadUI(pid));
        }

        function showLoading(text) { document.getElementById('loading-text').innerText = text; document.getElementById('loading-overlay').classList.remove('hidden'); document.getElementById('loading-overlay').classList.add('flex'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }

        function saveProject() {
            showLoading("Packaging Audio...");
            setTimeout(() => {
                const saveObj = { version: "2.7", settings: { volMaster: document.getElementById('vol-master').value, volMusic: document.getElementById('vol-music').value, volSFX: document.getElementById('vol-sfx').value }, padsData: {} };
                Object.values(AppState.pads).forEach(p => { if(p.base64) saveObj.padsData[p.id] = { name: p.name, base64: p.base64, slides: p.slides, timings: p.timings, colorTheme: p.colorTheme }; });
                const jsonStr = JSON.stringify(saveObj); const blob = new Blob([jsonStr], {type: "application/json"}); const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `EduPlay_Project_${new Date().getTime()}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                hideLoading(); showToast("Project Saved Successfully", false);
            }, 100);
        }

        function loadProject(e) {
            if(!e.target.files.length) return; const file = e.target.files[0];
            showLoading("Decoding Audio Files..."); stopMusic();
            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const saveObj = JSON.parse(evt.target.result); const s = saveObj.settings;
                    if(s) {
                        if(s.volMaster !== undefined) { document.getElementById('vol-master').value = s.volMaster; document.getElementById('vol-master').dispatchEvent(new Event('input')); }
                        if(s.volMusic !== undefined) { document.getElementById('vol-music').value = s.volMusic; document.getElementById('vol-music').dispatchEvent(new Event('input')); }
                        if(s.volSFX !== undefined) { document.getElementById('vol-sfx').value = s.volSFX; document.getElementById('vol-sfx').dispatchEvent(new Event('input')); }
                    }
                    Object.keys(AppState.pads).forEach(id => clearPad(id));
                    if(saveObj.padsData) {
                        for(const [id, data] of Object.entries(saveObj.padsData)) {
                            if(AppState.pads[id]) {
                                await instantiateAudioOnPad(id, data.base64, data.name);
                                AppState.pads[id].slides = data.slides || []; 
                                AppState.pads[id].timings = data.timings || [];
                                AppState.pads[id].colorTheme = data.colorTheme || null;
                            }
                        }
                    }
                    Object.keys(AppState.pads).forEach(pid => updatePadUI(pid)); setMode('edit'); hideLoading(); showToast("Project Loaded!", false);
                } catch(err) { console.error(err); hideLoading(); showToast("Error loading file", true); }
            };
            reader.readAsText(file); e.target.value = ''; 
        }

        // Extracted setup for pads during load so it is reusable
        async function instantiateAudioOnPad(id, base64Data, nameParam) {
            const pad = AppState.pads[id];
            if(pad.player) { pad.player.dispose(); if(pad.gainNode) pad.gainNode.dispose(); }
            pad.base64 = base64Data; pad.name = nameParam || pad.name;

            return new Promise((resolve) => {
                pad.player = new Tone.Player({
                    url: base64Data,
                    onload: () => {
                        if (pad.type === 'music') pad.player.connect(musicGain);
                        else { pad.gainNode = new Tone.Gain(1).connect(sfxGain); pad.player.connect(pad.gainNode); }
                        resolve();
                    }
                });
            });
        }

        function initApp() {
            document.getElementById('btn-start').addEventListener('click', async () => { 
                await Tone.start(); AppState.isAudioReady = true; document.getElementById('start-overlay').classList.add('hidden'); 
            });

            ['A', 'B', 'C', 'D'].forEach(bank => {
                for(let i=1; i<=NUM_MUSIC_PADS; i++) createPadDOM(`m_${bank}_${i}`, 'music', document.getElementById('grid-music'), bank);
                for(let i=1; i<=NUM_SFX_PADS; i++) createPadDOM(`s_${bank}_${i}`, 'sfx', document.getElementById('grid-sfx'), bank);
            });

            setupEventListeners();
            drawVisualizer();
            requestAnimationFrame(updateScrubberLoop);
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
